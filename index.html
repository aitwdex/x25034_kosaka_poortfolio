<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <!-- スマートフォンで正しい画面幅を使用する -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- BootstrapのCSSを読み込む -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>kosaka yuuki / PORTFOLIO</title>
  <!-- Bootstrapより後に読み込むことで、自分のCSSを優先できる -->
  <link rel="stylesheet" href="style.css">
</head>

<body id="top">
  <header>
    <!--
      Bootstrapのナビゲーションnavbar-expand-md：
      スマートフォンでは折り畳み、768px以上では横並びになる
    -->
    <nav class="navbar navbar-expand-md bg-white">
      <div class="container">

        <a class="navbar-brand fw-semibold" href="index.html">
          kosaka yuuki / PORTFOLIO
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu"
          aria-controls="mainMenu" aria-expanded="false" aria-label="メニューを開く">
          <span class="navbar-toggler-icon"></span>
        </button>
        <!--
            ナビゲーションのリンク一覧ms-autoでメニューを右側へ寄せる
          -->

        <div class="collapse navbar-collapse" id="mainMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#top">TOP</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#works">WORKS</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#skills">SKILL</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#contact">CONTACT</a>
            </li>
          </ul>
        </div>

      </div>
    </nav>
  </header>
  <!--
     メインコンテンツ
 -->
  <main>

    <section class="py-5">
      <div class="container">

        <!--
        PCでは文章と写真を横並びにする
        スマートフォンでは縦並びにする
      -->
        <div class="row align-items-center g-5">

          <!--名前・説明・ボタン-->
          <div class="col-12 col-md-7">


            <p class="text-primary fw-semibold">
              HELLO, I’M X25034
            </p>


            <h1 class="display-3 fw-bold fst-italic mb-4">
              kosaka yuuki
            </h1>


            <p class="text-secondary lh-lg">
              授業・サークル・趣味で取り組んだ制作物をまとめた
              ポートフォリオです。
              Web制作やプログラミングを学んでいます。
              特にWebデザインを含めたデザイン関係の仕事に興味があり、
              見る人にとって分かりやすく使いやすいデザインを
              作れるよう勉強しています。
            </p>

            <!-- ページ内・別ページへ移動するボタン -->
            <div class="d-flex gap-3 mt-4">


              <a href="#works" class="btn btn-dark">
                作品を見る →
              </a>


              <a href="about/about.html" class="btn btn-outline-secondary">
                自己紹介
              </a>

            </div>
          </div>



          <!-- プロフィール写真 -->
          <div class="col-12 col-md-5">
            <img src="assets/profile.jpg" class="img-fluid rounded-4" alt="小坂勇輝のプロフィール写真">
          </div>


        </div>
      </div>
    </section>


  </main>

  <!--
    BootstrapのJavaScriptを読み込む
    メニューの開閉などに使用する
  -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
  <script src="js/javascript.js"></script>


</body>

</html>
